<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Repertorio — Maduro 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#FFF;--text:#1C1917;--sub:#78716C;--muted:#A8A29E;--border:#E7E5E0;--hover:#F3F1EC;
  --T1:#C0392B;--T1bg:#FDF2F2;--T1b:#F5C6C2;
  --T2:#3730A3;--T2bg:#F0F0FF;--T2b:#C7C8F5;
  --T3:#B45309;--T3bg:#FFFBEB;--T3b:#FDE68A;
  --T4:#047857;--T4bg:#ECFDF5;--T4b:#A7F3D0;
  --T5:#6D28D9;--T5bg:#F5F3FF;--T5b:#DDD6FE;
  --T6:#C2410C;--T6bg:#FFF7ED;--T6b:#FED7AA;
  --T7:#0369A1;--T7bg:#F0F9FF;--T7b:#BAE6FD;
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
.app{max-width:880px;margin:0 auto;padding:20px 16px 60px}
.header{margin-bottom:16px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.header h1{font-family:'Playfair Display',serif;font-size:23px;font-weight:700;line-height:1.2}
.header h1 em{color:#C0392B;font-style:normal}
.header-actions{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap}
.btn-dark{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:#1C1917;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn-dark:hover{background:#292524}
.btn-dark .plus{font-size:17px;font-weight:300;line-height:1}
.btn-outline{display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:8px;background:white;color:var(--sub);border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn-outline:hover{border-color:var(--muted)}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--sub);font-weight:500}
.stat{display:flex;align-items:center;gap:4px}
.stat-dot{width:7px;height:7px;border-radius:50%}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:9px 18px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn:hover{color:var(--sub)}
.tab-btn.active{color:var(--text);font-weight:600;border-bottom-color:#1C1917}
.terr-scroll{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.terr-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .13s;white-space:nowrap;user-select:none}
.terr-btn:hover{border-color:#C9C5BF}
.terr-btn.active{font-weight:600}
.terr-cnt{font-size:9.5px;opacity:.55}
.terr-banner{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:8px;margin-bottom:10px;font-size:13px}
.terr-banner strong{font-weight:600}
.terr-desc{opacity:.75}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:4px 10px;border-radius:14px;border:1.5px solid var(--border);background:white;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .13s}
.filter-btn:hover{border-color:var(--muted)}
.filter-btn.active{background:#1C1917;color:white;border-color:#1C1917}
.search-wrap{position:relative;margin-bottom:9px}
.search-wrap input{width:100%;padding:9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 4px}
.results-count{font-size:11px;color:var(--muted);margin-bottom:7px}
.song-list{display:flex;flex-direction:column;gap:4px}
.song-card{border:1px solid var(--border);border-radius:10px;background:white;overflow:hidden;transition:box-shadow .15s}
.song-card:hover{box-shadow:0 1px 8px rgba(0,0,0,.06)}
.song-card.expanded{box-shadow:0 2px 14px rgba(0,0,0,.08)}
.song-row{display:flex;align-items:center;padding:9px 12px;gap:8px;cursor:pointer;user-select:none}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .2s}
.song-main{flex:1;min-width:0}
.song-title{font-size:13px;font-weight:500}
.song-anchor{font-size:11px;color:var(--sub);font-style:italic;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;margin-left:4px;font-size:9.5px;font-weight:700;font-style:normal;letter-spacing:.03em;vertical-align:middle}
.badge-orig{color:#6D28D9}
.badge-user{color:#0369A1}
.badge-impro{color:#059669}
.badge-uptempo{color:#C2410C}
.badge-short{color:#0369A1}
.song-key{font-size:11px;color:var(--muted);flex-shrink:0;font-weight:500;min-width:20px;text-align:right}
.style-tag{font-size:10px;padding:2px 6px;border-radius:9px;background:#F3F0EA;color:var(--sub);flex-shrink:0;font-weight:500;white-space:nowrap}
.uptempo-tag{font-size:10px;padding:2px 6px;border-radius:9px;background:#FFF7ED;color:#C2410C;flex-shrink:0;font-weight:600;white-space:nowrap}
.tempo-pip{font-size:10px;padding:2px 6px;border-radius:9px;flex-shrink:0;font-weight:600}
.tempo-pip.ballad{background:#EEF2FF;color:#3730A3}
.tempo-pip.medium{background:#FFF7ED;color:#C2410C}
.tempo-pip.up{background:#ECFDF5;color:#047857}
.terr-emoji{font-size:13px;flex-shrink:0}
.song-detail{padding:10px 12px 13px;border-top:1px solid var(--border);animation:slideDown .15s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.detail-section{margin-bottom:11px}
.detail-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.detail-note{font-weight:300;text-transform:none;letter-spacing:0;color:var(--muted)}
.pill-row{display:flex;gap:5px;flex-wrap:wrap}
.pill-btn{padding:4px 11px;border-radius:6px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;transition:all .12s;color:var(--sub);font-weight:400}
.pill-btn:hover{border-color:var(--muted)}
.pill-btn.active{font-weight:600}
.toggle-btn{display:flex;align-items:center;gap:7px;padding:4px 11px;border-radius:6px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;transition:all .12s;color:var(--sub)}
.toggle-btn.active-green{border-color:#059669;background:#ECFDF5;color:#047857;font-weight:600}
.toggle-btn.active-orange{border-color:#C2410C;background:#FFF7ED;color:#C2410C;font-weight:600}
.toggle-btn.active-blue{border-color:#0369A1;background:#F0F9FF;color:#0369A1;font-weight:600}
.edit-row{display:flex;gap:8px;margin-bottom:11px}
.edit-field{flex:1}
.edit-field label{display:block;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.edit-input{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#FAFAF7;outline:none;transition:border-color .15s}
.edit-input:focus{border-color:var(--muted);background:white}
.edit-input::placeholder{color:#C4BFBA}
.anchor-input{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;font-style:italic;color:var(--text);background:#FAFAF7;outline:none;transition:border-color .15s}
.anchor-input:focus{border-color:var(--muted);background:white}
.anchor-input::placeholder{color:#C4BFBA}
.terr-pills{display:flex;flex-wrap:wrap;gap:4px}
.terr-pill{font-size:10px;padding:3px 8px;border-radius:9px;border:1px solid var(--border);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;color:var(--sub)}
.terr-pill:hover{border-color:var(--muted)}
.terr-pill.active{font-weight:600}
.delete-btn{display:flex;align-items:center;gap:5px;margin-top:8px;padding:5px 10px;border-radius:6px;border:1px solid #FCA5A5;background:#FFF5F5;color:#B91C1C;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .12s}
.delete-btn:hover{background:#FEE2E2}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.sb-wrap{padding-top:4px}
.sb-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:white;border:1px solid var(--border);border-radius:12px}
.sb-controls-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-right:4px}
.sb-status-toggle{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
.sb-status-btn{padding:6px 12px;background:white;border:none;font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;color:var(--sub);transition:all .13s}
.sb-status-btn.active{background:#1C1917;color:white;font-weight:600}
.btn-generate{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:#C0392B;color:white;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-left:auto}
.btn-generate:hover{background:#A93226}
.sb-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sb-slot-ballad{grid-column:1/-1}
@media(max-width:560px){.sb-slots{grid-template-columns:1fr}.sb-slot-ballad{grid-column:auto}}
.slot-card{border:1.5px solid var(--border);border-radius:12px;background:white;overflow:hidden;transition:all .2s}
.slot-card.has-song{border-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.slot-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid var(--border)}
.slot-cat{display:flex;align-items:center;gap:6px}
.slot-cat-emoji{font-size:16px}
.slot-cat-name{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sub)}
.slot-actions{display:flex;gap:4px}
.slot-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--sub)}
.slot-btn:hover{border-color:var(--muted);background:var(--hover)}
.slot-btn.locked{background:#FFF7ED;border-color:#FED7AA;color:#C2410C}
.slot-body{padding:12px}
.slot-empty{text-align:center;padding:14px 8px;color:var(--muted);font-size:12px;line-height:1.5}
.slot-empty-btn{display:inline-block;margin-top:6px;font-size:11px;color:#0369A1;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'DM Sans',sans-serif}
.slot-song-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.slot-song-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.slot-key{font-size:11px;color:var(--muted);font-weight:500}
.slot-terr{font-size:12px}
.sb-balance{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:white;border:1px solid var(--border);border-radius:10px;flex-wrap:wrap}
.sb-balance-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.sb-balance-pills{display:flex;gap:5px;flex-wrap:wrap}
.balance-pill{font-size:11px;padding:3px 9px;border-radius:9px;font-weight:500}
.sb-copy{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;color:var(--text);transition:all .13s;margin-left:auto}
.sb-copy:hover{background:var(--hover)}
.sb-copy.copied{background:#ECFDF5;border-color:#A7F3D0;color:#047857}
.sb-extras{margin-top:4px}
.sb-extras-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sb-extra-list{display:flex;flex-direction:column;gap:4px}
.sb-extra-card{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:white;cursor:pointer;transition:all .13s}
.sb-extra-card:hover{border-color:#C9C5BF;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.sb-extra-card.selected{border-color:#1C1917;background:#F7F5F0}
.sb-extra-main{flex:1;min-width:0}
.sb-extra-title{font-size:13px;font-weight:500}
.sb-extra-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.sb-extra-check.on{background:#1C1917;border-color:#1C1917;color:white;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fadeIn .15s ease}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:14px;padding:22px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:slideUp .18s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-label{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#FAFAF7;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--muted);background:white}
.form-terr-grid{display:flex;flex-wrap:wrap;gap:5px}
.form-terr-btn{padding:5px 10px;border-radius:7px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .12px;color:var(--sub)}
.form-terr-btn:hover{border-color:var(--muted)}
.form-terr-btn.active{font-weight:600}
.form-check{display:flex;align-items:center;gap:8px;margin-top:4px;cursor:pointer}
.form-check input{width:15px;height:15px;cursor:pointer;accent-color:#6D28D9}
.form-check span{font-size:13px;color:var(--sub)}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--sub)}
.btn-cancel:hover{background:var(--hover)}
.btn-primary{flex:2;padding:10px;border-radius:8px;border:none;background:#1C1917;color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .14s}
.btn-primary:hover{background:#292524}
.form-error{font-size:11px;color:#B91C1C;margin-top:3px}
.io-section{margin-bottom:14px}
.io-section p{font-size:13px;color:var(--sub);margin-bottom:7px;line-height:1.5}
.io-textarea{width:100%;height:90px;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:11px;font-family:monospace;color:var(--text);background:#FAFAF7;outline:none;resize:vertical}
.io-textarea:focus{border-color:var(--muted)}
.io-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.btn-export{padding:8px 14px;border-radius:7px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;color:var(--text);transition:all .12s}
.btn-export:hover{background:var(--hover)}
.btn-import{padding:8px 14px;border-radius:7px;border:none;background:#1C1917;color:white;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-import:hover{background:#292524}
.io-msg{font-size:11.5px;margin-top:5px}
.io-msg.ok{color:#047857}
.io-msg.err{color:#B91C1C}
@media(max-width:500px){.style-tag{display:none}.header h1{font-size:20px}.header-actions{width:100%}.btn-dark,.btn-outline{flex:1;justify-content:center}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>Mapa de Repertorio — <em>Maduro</em> 2026</h1>
      <div class="header-actions">
        <button class="btn-outline" id="btnIO">💾 Exportar / Importar</button>
        <button class="btn-dark" id="btnOpenAdd"><span class="plus">+</span> Agregar canción</button>
      </div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="repertorio">🎵 Repertorio</button>
    <button class="tab-btn" data-tab="setbuilder">🎼 Set Builder</button>
  </div>
  <div id="tab-repertorio">
    <div class="terr-scroll" id="terrFilters"></div>
    <div id="terrBanner"></div>
    <div class="filter-row" id="filterRow"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar canción o estilo…"/>
      <button class="search-clear" id="searchClear" style="display:none">✕</button>
    </div>
    <div class="results-count" id="resultsCount"></div>
    <div class="song-list" id="songList"></div>
  </div>
  <div id="tab-setbuilder" style="display:none">
    <div class="sb-wrap">
      <div class="sb-controls">
        <span class="sb-controls-label">Territorio</span>
        <div class="terr-scroll" id="sbTerrFilters" style="margin-bottom:0;flex:1"></div>
        <span class="sb-controls-label" style="margin-left:4px">Pool</span>
        <div class="sb-status-toggle">
          <button class="sb-status-btn active" data-spool="active">Perlas y trabajando</button>
          <button class="sb-status-btn" data-spool="all">Todas</button>
        </div>
        <button class="btn-generate" id="btnGenerate">🎲 Generar set</button>
      </div>
      <div class="sb-slots" id="sbSlots"></div>
      <div class="sb-balance" id="sbBalance" style="display:none"></div>
      <div class="sb-extras" id="sbExtras"></div>
    </div>
  </div>
</div>
<button class="btn-outline" id="fabBtn" style="position:fixed;bottom:20px;right:20px;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)">+ Agregar</button>
<div class="modal-overlay hidden" id="addModal">
  <div class="modal">
    <h2>Agregar canción</h2>
    <div class="form-row"><label class="form-label">Título *</label><input class="form-input" id="fTitle" placeholder="ej. Stardust"/><div class="form-error" id="fTitleErr"></div></div>
    <div style="display:flex;gap:10px">
      <div class="form-row" style="flex:1"><label class="form-label">Tonalidad</label><input class="form-input" id="fKey" placeholder="ej. Bb"/></div>
      <div class="form-row" style="flex:1"><label class="form-label">Estilo / Tag</label><input class="form-input" id="fStyle" placeholder="ej. Bossa, Ballad…"/></div>
    </div>
    <div class="form-row"><label class="form-label">Territorio *</label><div class="form-terr-grid" id="formTerrGrid"></div><div class="form-error" id="fTerrErr"></div></div>
    <div class="form-row"><label class="form-check"><input type="checkbox" id="fOrig"/><span>Composición propia / arreglo original</span></label></div>
    <div class="modal-btns"><button class="btn-cancel" id="btnCancelAdd">Cancelar</button><button class="btn-primary" id="btnConfirmAdd">Agregar</button></div>
  </div>
</div>
<div class="modal-overlay hidden" id="ioModal">

function save(){localStorage.setItem(LS_STATES,JSON.stringify(songStates));localStorage.setItem(LS_USERS,JSON.stringify(userSongs));}
function allSongs(){return[...BASE_SONGS,...userSongs];}
function songId(s){return s.t+(s.k?"__"+s.k:"")+(s._uid?"__"+s._uid:"");}
function getState(s){
  const saved=songStates[songId(s)];
  if(saved)return{short:false,uptempo:false,...saved};
  return{status:s.tested?"trabajando":"nueva",anchor:"",customTerr:null,tempo:null,note:"",impro:false,customKey:null,customStyle:null,short:false,uptempo:false};
}
function setState(s,u){songStates[songId(s)]={...getState(s),...u};save();}
function effectiveTerr(s){return getState(s).customTerr||s.terr;}
function getKey(s){const st=getState(s);return st.customKey!=null?st.customKey:s.k;}
function getStyle(s){const st=getState(s);return st.customStyle!=null?st.customStyle:s.s;}
function getTerr(id){return TERRITORIES.find(t=>t.id===id);}
function isUser(s){return!!s._uid;}
function isUptempo(s){const st=(getStyle(s)||"").toLowerCase();return st.includes("uptempo")||!!getState(s).uptempo||!!s.uptempo;}
function isShort(s){return!!getState(s).short;}
function getCategory(song){
  const st=(getStyle(song)||"").toLowerCase();
  if(st.includes("blues"))return"blues";
  if(st.match(/bossa|zamba|bolero|tango|son\b|samba|huayno|chacarera|cha-cha|waltz|latin\b|vals|son montuno|son cubano/))return"latino";
  if(st.includes("arrangement")||st.includes("arr.")||st.includes("original")||st.includes("medley")||st.includes("canción"))return"arrangement";
  if(st.includes("ballad"))return"ballad";
  return"swing";
}
function getPool(terrFilter){
  return allSongs().filter(s=>{
    const et=effectiveTerr(s);
    const mt=terrFilter==="ALL"||et===terrFilter;
    const st=getState(s).status;
    const ok=sbPool==="all"||st==="trabajando"||st==="perla";
    return mt&&ok;
  });
}
function pickRandom(arr){return arr.length?arr[Math.floor(Math.random()*arr.length)]:null;}
function generateSlot(slotId,terrFilter){
  const inTerr=getPool(terrFilter).filter(s=>getCategory(s)===slotId);
  if(inTerr.length)return pickRandom(inTerr);
  const anyTerr=getPool("ALL").filter(s=>getCategory(s)===slotId);
  return pickRandom(anyTerr);
}
function generateSet(){SLOTS.forEach(sl=>{if(!sbSlotState[sl.id].locked)sbSlotState[sl.id].song=generateSlot(sl.id,sbTerr);});sbExtrasSelected=new Set();sbGenerated=true;}
function filtered(){
  return allSongs().filter(s=>{
    const mt=activeTerr==="ALL"||effectiveTerr(s)===activeTerr;
    const q=searchQ.toLowerCase(),ms=!q||s.t.toLowerCase().includes(q)||(getStyle(s)&&getStyle(s).toLowerCase().includes(q));
    const fu=!filterUptempo||isUptempo(s);
    const fs=!filterShort||isShort(s);
    return mt&&ms&&fu&&fs;
  });
}

    const detail=isExp?`<div class="song-detail" style="background:${terr.bg}">

      <div class="edit-row">

function getTempoBg(k){return k==="ballad"?"#EEF2FF":k==="medium"?"#FFF7ED":"#ECFDF5";}
function getTempoColor(k){return k==="ballad"?"#3730A3":k==="medium"?"#C2410C":"#047857";}
function getTempoBorder(k){return k==="ballad"?"#C7C8F5":k==="medium"?"#FED7AA":"#A7F3D0";}
function bindRepEvents(){
  document.querySelectorAll(".terr-btn").forEach(b=>b.addEventListener("click",()=>{activeTerr=b.dataset.tid;expandedId=null;render();}));
  const si=document.getElementById("searchInput"),sc=document.getElementById("searchClear");
  si.value=searchQ;
  si.oninput=e=>{searchQ=e.target.value;sc.style.display=searchQ?"block":"none";expandedId=null;render();};
  sc.onclick=()=>{searchQ="";si.value="";sc.style.display="none";render();};
  const fu=document.getElementById("btnFilterUp");
  if(fu)fu.onclick=()=>{filterUptempo=!filterUptempo;render();};
  const fs=document.getElementById("btnFilterShort");
  if(fs)fs.onclick=()=>{filterShort=!filterShort;render();};
  document.getElementById("songList").addEventListener("click",e=>{
    const btn=e.target.closest("[data-action]");if(!btn)return;e.stopPropagation();
    const{action,id,val,base,uid}=btn.dataset;
    if(action==="expand"){expandedId=expandedId===id?null:id;render();return;}
    const song=allSongs().find(s=>songId(s)===id);
    if(action==="status"&&song){setState(song,{status:val});render();return;}
    if(action==="tempo"&&song){setState(song,{tempo:getState(song).tempo===val?null:val});render();return;}
    if(action==="impro"&&song){setState(song,{impro:!getState(song).impro});render();return;}
    if(action==="uptempo"&&song){setState(song,{uptempo:!getState(song).uptempo});render();return;}
    if(action==="short"&&song){setState(song,{short:!getState(song).short});render();return;}
    if(action==="terr"&&song){setState(song,{customTerr:val===base?null:val});render();return;}
    if(action==="delete"&&uid){if(confirm("¿Eliminar esta canción?")){userSongs=userSongs.filter(s=>s._uid!==uid);expandedId=null;save();render();}}
  });
  document.getElementById("songList").addEventListener("input",e=>{
    const inp=e.target.closest("[data-action]");if(!inp)return;e.stopPropagation();
    const{action,id}=inp.dataset,song=allSongs().find(s=>songId(s)===id);
    if(!song)return;
    if(action==="anchor")setState(song,{anchor:inp.value});
    if(action==="note")setState(song,{note:inp.value});
    if(action==="editkey")setState(song,{customKey:inp.value||null});
    if(action==="editstyle")setState(song,{customStyle:inp.value||null});
  });
}

  el.style.display="flex";
  const counts={ballad:0,medium:0,up:0,none:0};
  songs.forEach(s=>{const t=getState(s).tempo;counts[t||"none"]++;});
  const pips=[];
  if(counts.ballad)pips.push(`<span class="balance-pill" style="background:#EEF2FF;color:#3730A3">🎻 ${counts.ballad} Ballad</span>`);
  if(counts.medium)pips.push(`<span class="balance-pill" style="background:#FFF7ED;color:#C2410C">⚡ ${counts.medium} Medium</span>`);
  if(counts.up)pips.push(`<span class="balance-pill" style="background:#ECFDF5;color:#047857">🚀 ${counts.up} Up</span>`);
  if(counts.none)pips.push(`<span class="balance-pill" style="background:#F3F0EA;color:var(--sub)">? ${counts.none} sin tempo</span>`);
  el.innerHTML=`<span class="sb-balance-label">Balance</span>
    <div class="sb-balance-pills">${pips.join("")}</div>
    <button class="sb-copy" id="sbCopyBtn">📋 Copiar set</button>`;
}
function renderSBExtras(){
  const el=document.getElementById("sbExtras");
  if(!sbGenerated){el.innerHTML="";return;}
  const usedIds=new Set(SLOTS.map(sl=>sbSlotState[sl.id].song).filter(Boolean).map(s=>songId(s)));
  const pool=getPool(sbTerr).filter(s=>!usedIds.has(songId(s)));
  pool.sort((a,b)=>{const r={perla:0,trabajando:1,nueva:2};const ra=r[getState(a).status]??2,rb=r[getState(b).status]??2;return ra!==rb?ra-rb:a.t.localeCompare(b.t);});
  const extras=pool.slice(0,6);
  if(!extras.length){el.innerHTML=`<div class="sb-extras-title">Para completar el set</div><div class="empty" style="padding:16px">No hay más canciones disponibles.</div>`;return;}
  el.innerHTML=`<div class="sb-extras-title">Para completar el set <span style="font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">— seleccioná las que querés agregar</span></div>
    <div class="sb-extra-list">${extras.map(song=>{
      const id=songId(song),state=getState(song),et=effectiveTerr(song),terr=getTerr(et);
      const sel=sbExtrasSelected.has(id),dot=STATUS[state.status]?.dot||"#D6D3D1";
      const tempoPip=state.tempo?`<span class="tempo-pip ${state.tempo}">${TEMPO[state.tempo].label}</span>`:"";
      return`<div class="sb-extra-card${sel?" selected":""}" data-sbextra="${id}">
        <div class="status-dot" style="background:${dot}"></div>
        <div class="sb-extra-main">
          <div class="sb-extra-title">${song.t}${state.impro?'<span style="font-size:10px;color:#047857;margin-left:4px">🎤</span>':""}${isUptempo(song)?'<span style="font-size:10px;color:#C2410C;margin-left:4px">⚡</span>':""}</div>
          <div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap">
            ${getKey(song)?`<span class="song-key">${getKey(song)}</span>`:""}
            ${getStyle(song)&&!getStyle(song).toLowerCase().includes("uptempo")?`<span class="style-tag">${getStyle(song)}</span>`:""}
            ${tempoPip}<span style="font-size:11px">${terr.emoji}</span>
          </div>
        </div>
        <div class="sb-extra-check${sel?" on":""}">${sel?"✓":""}</div>
      </div>`;
    }).join("")}</div>`;
}
function buildSetText(){
  const lines=["🎼 SET — Maduro 2026",""];
  SLOTS.forEach(sl=>{
    const s=sbSlotState[sl.id].song;
    if(s){const k=getKey(s),st=getStyle(s),tmp=getState(s).tempo;
      lines.push(`${sl.emoji} ${sl.label}: ${s.t}${k?" ("+k+")":""}${st&&!st.toLowerCase().includes("uptempo")?" — "+st:""}${isUptempo(s)?" ⚡":""}${tmp?" · "+TEMPO[tmp].label:""}`);}
  });
  const extras=[...sbExtrasSelected];
  if(extras.length){lines.push("","— Extras:");extras.forEach(id=>{const s=allSongs().find(x=>songId(x)===id);if(s)lines.push(`  + ${s.t}${getKey(s)?" ("+getKey(s)+")":""}`);});}
  return lines.join("\n");
}
function bindSBEvents(){
  document.querySelectorAll("[data-sbtid]").forEach(b=>b.addEventListener("click",()=>{sbTerr=b.dataset.sbtid;renderSB();bindSBEvents();}));
  document.querySelectorAll(".sb-status-btn").forEach(b=>b.addEventListener("click",()=>{sbPool=b.dataset.spool;document.querySelectorAll(".sb-status-btn").forEach(x=>x.classList.toggle("active",x.dataset.spool===sbPool));}));
  document.getElementById("btnGenerate").onclick=()=>{generateSet();renderSB();bindSBEvents();};
  document.querySelectorAll("[data-sblock]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const sl=b.dataset.sblock;sbSlotState[sl].locked=!sbSlotState[sl].locked;renderSBSlots();renderSBBalance();bindSBEvents();}));
  document.querySelectorAll("[data-sbreroll]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const sl=b.dataset.sbreroll;if(!sbSlotState[sl].locked){sbSlotState[sl].song=generateSlot(sl,sbTerr);sbExtrasSelected=new Set();renderSBSlots();renderSBBalance();renderSBExtras();bindSBEvents();}}));
  document.querySelectorAll("[data-sbpool]").forEach(b=>b.addEventListener("click",()=>{sbPool="all";document.querySelectorAll(".sb-status-btn").forEach(x=>x.classList.toggle("active",x.dataset.spool==="all"));generateSet();renderSB();bindSBEvents();}));
  document.querySelectorAll("[data-sbextra]").forEach(card=>card.addEventListener("click",()=>{const id=card.dataset.sbextra;if(sbExtrasSelected.has(id))sbExtrasSelected.delete(id);else sbExtrasSelected.add(id);renderSBExtras();bindSBEvents();}));
  const cpBtn=document.getElementById("sbCopyBtn");
  if(cpBtn)cpBtn.onclick=()=>{navigator.clipboard.writeText(buildSetText()).then(()=>{cpBtn.textContent="✓ Copiado!";cpBtn.classList.add("copied");setTimeout(()=>{cpBtn.textContent="📋 Copiar set";cpBtn.classList.remove("copied");},2000);}).catch(()=>{});};
}
function bindGlobalEvents(){
  document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>{
    activeTab=b.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.toggle("active",x.dataset.tab===activeTab));
    document.getElementById("tab-repertorio").style.display=activeTab==="repertorio"?"block":"none";
    document.getElementById("tab-setbuilder").style.display=activeTab==="setbuilder"?"block":"none";
    render();
  }));
  document.getElementById("btnOpenAdd").onclick=openAddModal;
  document.getElementById("fabBtn").onclick=openAddModal;
  document.getElementById("btnIO").onclick=openIOModal;
}
let selectedFormTerr=null;
function openAddModal(){
  selectedFormTerr=null;
  ["fTitle","fKey","fStyle"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fOrig").checked=false;
  ["fTitleErr","fTerrErr"].forEach(id=>document.getElementById(id).textContent="");
  const grid=document.getElementById("formTerrGrid");
  grid.innerHTML=TERRITORIES.filter(t=>t.id!=="ALL").map(t=>`<button class="form-terr-btn" data-ftid="${t.id}" style="border-color:${t.border};color:${t.color};background:${t.bg}">${t.emoji} ${t.name}</button>`).join("");
  grid.querySelectorAll(".form-terr-btn").forEach(b=>b.addEventListener("click",()=>{
    selectedFormTerr=b.dataset.ftid;
    grid.querySelectorAll(".form-terr-btn").forEach(x=>{const tt=getTerr(x.dataset.ftid);x.classList.remove("active");x.style.borderColor=tt.border;x.style.fontWeight="400";});
    const tt=getTerr(selectedFormTerr);b.classList.add("active");b.style.borderColor=tt.color;b.style.fontWeight="600";
    document.getElementById("fTerrErr").textContent="";
  }));
  document.getElementById("addModal").classList.remove("hidden");
  document.getElementById("btnCancelAdd").onclick=()=>document.getElementById("addModal").classList.add("hidden");
  document.getElementById("addModal").onclick=e=>{if(e.target===e.currentTarget)e.target.classList.add("hidden");};
  document.getElementById("btnConfirmAdd").onclick=submitSong;
  document.getElementById("fTitle").focus();
}
function submitSong(){
  const title=document.getElementById("fTitle").value.trim();let ok=true;
  if(!title){document.getElementById("fTitleErr").textContent="El título es obligatorio.";ok=false;}else document.getElementById("fTitleErr").textContent="";
  if(!selectedFormTerr){document.getElementById("fTerrErr").textContent="Elegí un territorio.";ok=false;}else document.getElementById("fTerrErr").textContent="";
  if(!ok)return;
  const ns={t:title,k:document.getElementById("fKey").value.trim(),s:document.getElementById("fStyle").value.trim(),terr:selectedFormTerr,orig:document.getElementById("fOrig").checked,_uid:Date.now().toString(36)+Math.random().toString(36).slice(2,6)};
  userSongs.push(ns);save();
  document.getElementById("addModal").classList.add("hidden");
  activeTab="repertorio";activeTerr="ALL";searchQ="";expandedId=null;
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.toggle("active",x.dataset.tab==="repertorio"));
  document.getElementById("tab-repertorio").style.display="block";
  document.getElementById("tab-setbuilder").style.display="none";
  render();
  setTimeout(()=>{const el=document.querySelector(`[data-id="${songId(ns)}"]`);if(el)el.closest(".song-card").scrollIntoView({behavior:"smooth",block:"center"});},100);
}
function openIOModal(){
  document.getElementById("exportMsg").textContent="";document.getElementById("importMsg").textContent="";document.getElementById("ioImportText").value="";
  document.getElementById("ioModal").classList.remove("hidden");
  document.getElementById("btnCloseIO").onclick=()=>document.getElementById("ioModal").classList.add("hidden");
  document.getElementById("ioModal").onclick=e=>{if(e.target===e.currentTarget)e.target.classList.add("hidden");};
  document.getElementById("btnExport").onclick=()=>{
    const blob=new Blob([JSON.stringify({songStates,userSongs,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`maduro26_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
    document.getElementById("exportMsg").textContent="✓ Descargado";
  };
  document.getElementById("btnImport").onclick=()=>{
    const msg=document.getElementById("importMsg");
    try{const d=JSON.parse(document.getElementById("ioImportText").value.trim());
      if(!d.songStates||!d.userSongs)throw new Error();
      if(!confirm("Reemplaza todos los datos actuales. ¿Continuar?"))return;
      songStates=d.songStates;userSongs=d.userSongs;save();
      msg.className="io-msg ok";msg.textContent="✓ Importado correctamente.";render();
    }catch{msg.className="io-msg err";msg.textContent="JSON inválido o con formato incorrecto.";}
  };
}
bindGlobalEvents();
render();
</script>
